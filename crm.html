<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Moon Auto Detailing - CRM</title>
<link rel="icon" href="/NewLogoColor.png" type="image/png" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
:root {
  --moon-primary: #7fb8e6;
  --moon-primary-dark: #4f95cf;
  --moon-light-bg: #e9f1fb;
  --moon-soft: #9fb7d3;
  --moon-shadow: rgba(0,0,0,0.08);
}

* {
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: #0e0e0e;
  min-height: 100vh;
  color: white;
  overflow-x: hidden;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

#watermarkLogo {
  position: fixed;
  inset: 0;
  margin: auto;
  width: 1200px;
  max-width: 95vw;
  opacity: 0.08;
  z-index: 1;
  pointer-events: none;
}

#watermarkUnderlay {
  position: fixed;
  inset: 0;
  background: #000;
  opacity: 0.12;
  z-index: 0;
  pointer-events: none;
}

#pageOverlay {
  position: relative;
  z-index: 2;
  max-width: 1180px;
  margin: 0 auto;
}

#loginOverlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, #0e0e0e 0%, #000 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99999;
  padding: 18px;
}

#loginCard {
  width: 360px;
  padding: 40px 34px;
  border-radius: 18px;
  background: rgba(111,147,196,0.12);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  text-align: center;
}

#loginLogo {
  width: 140px;
  margin-bottom: 18px;
  opacity: 0.95;
}

.loginTitle {
  color: var(--moon-primary);
  margin: 0 0 20px;
  font-weight: 700;
}

#loginPassword {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.08);
  color: white;
  outline: none;
  margin-bottom: 14px;
  font-size: 15px;
}

#loginPassword::placeholder {
  color: rgba(255,255,255,0.6);
}

#loginButton,
.moon-tab,
.primary-btn {
  padding: 10px 16px;
  font-weight: 700;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: var(--moon-primary);
  color: white;
  transition: all 0.15s ease;
}

#loginButton {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
}

#loginButton:hover,
.moon-tab:hover,
.primary-btn:hover {
  background: var(--moon-primary-dark);
}

.secondary-btn {
  padding: 10px 14px;
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  color: white;
  font-weight: 700;
}

.danger-btn {
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #b00020;
  color: white;
  font-weight: 700;
}

#loginError {
  margin-top: 12px;
  color: #ff6b6b;
  display: none;
  font-size: 14px;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 18px;
}

.topbar h1 {
  margin: 0;
  color: var(--moon-primary);
}

.topbar p {
  margin: 4px 0 0;
  color: rgba(255,255,255,0.72);
}

.topbar-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.crm-shell {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 330px;
  gap: 16px;
  align-items: start;
}

.panel,
.lead-form-card,
.detail-panel {
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  background: rgba(111,147,196,0.14);
  backdrop-filter: blur(12px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.28);
}

.panel {
  padding: 16px;
}

.filters {
  display: grid;
  grid-template-columns: 2fr repeat(4, 1fr) auto;
  gap: 10px;
  margin-bottom: 14px;
}

.field label,
.lead-form-card label,
.detail-form label {
  display: block;
  margin: 0 0 5px;
  font-size: 12px;
  font-weight: 700;
  color: rgba(255,255,255,0.8);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.field input,
.field select,
.lead-form-card input,
.lead-form-card select,
.lead-form-card textarea,
.detail-form input,
.detail-form select,
.detail-form textarea {
  width: 100%;
  padding: 10px 11px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.08);
  color: white;
  outline: none;
}

.field select option,
.lead-form-card select option,
.detail-form select option {
  background: #162033;
  color: white;
}

.lead-form-card textarea,
.detail-form textarea {
  min-height: 70px;
  resize: vertical;
}

.customer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px;
}

.customer-card {
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 14px;
  padding: 14px;
  background: var(--moon-light-bg);
  color: #142033;
  box-shadow: 0 6px 18px rgba(0,0,0,0.18);
  transition: 0.15s ease;
}

.customer-card:hover {
  transform: translateY(-1px);
  box-shadow: 0 10px 22px rgba(0,0,0,0.22);
}

.customer-card.active {
  outline: 3px solid var(--moon-primary);
}

.customer-name {
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 6px;
}

.muted {
  color: rgba(255,255,255,0.68);
}

.customer-card .muted {
  color: #526174;
}

.card-line {
  font-size: 13px;
  margin-top: 4px;
  overflow-wrap: anywhere;
}

.badge-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 8px;
  border-radius: 999px;
  background: rgba(79,120,168,0.16);
  color: #24496f;
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
}

.badge-hot {
  background: #ffd966;
  color: #111;
}

.lead-form-card {
  padding: 16px;
  position: sticky;
  top: 14px;
}

.lead-form-card h2,
.detail-panel h2,
.detail-section h3 {
  margin: 0 0 12px;
  color: var(--moon-primary);
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.span-2 {
  grid-column: 1 / -1;
}

.lead-form-card button,
.detail-form button {
  width: 100%;
  margin-top: 10px;
}

.detail-panel {
  display: none;
  margin-top: 16px;
  padding: 16px;
}

.detail-panel.open {
  display: block;
}

.detail-header {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 14px;
}

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.detail-section {
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 12px;
  background: rgba(0,0,0,0.16);
}

.detail-item {
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  font-size: 14px;
}

.detail-item:last-child {
  border-bottom: none;
}

.detail-form {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.status-line {
  min-height: 20px;
  margin: 0 0 12px;
  color: rgba(255,255,255,0.75);
}

.error-text {
  color: #ff8a8a;
}

.kpi-strip {
  display: grid;
  grid-template-columns: repeat(5, minmax(120px, 1fr));
  gap: 12px;
  margin: 0 0 16px;
}

.kpi-card {
  border-radius: 16px;
  padding: 16px;
  background: #f4f8fd;
  color: #142033;
  box-shadow: 0 10px 26px rgba(0,0,0,0.22);
}

.kpi-label {
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #526174;
}

.kpi-value {
  margin-top: 6px;
  font-size: 30px;
  font-weight: 900;
  color: #24496f;
}

.crm-sections {
  display: grid;
  gap: 16px;
}

.crm-section {
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 18px;
  padding: 14px;
  background: rgba(111,147,196,0.13);
  box-shadow: 0 12px 32px rgba(0,0,0,0.24);
}

.crm-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}

.crm-section-header h2 {
  margin: 0;
  color: var(--moon-primary);
  font-size: 20px;
}

.section-count {
  color: rgba(255,255,255,0.68);
  font-size: 13px;
  font-weight: 700;
}

.section-card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(265px, 1fr));
  gap: 12px;
}

.customer-meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px 10px;
  margin-top: 10px;
}

.meta-label {
  display: block;
  color: #64748b;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
}

.meta-value {
  display: block;
  color: #142033;
  font-size: 13px;
  overflow-wrap: anywhere;
}

.notes-preview {
  margin-top: 10px;
  padding: 9px 10px;
  border-radius: 10px;
  background: rgba(127,184,230,0.16);
  color: #24496f;
  font-size: 13px;
  line-height: 1.35;
}

.quick-actions {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 2px 0 12px;
  margin-bottom: 4px;
  -webkit-overflow-scrolling: touch;
}

.quick-actions button {
  flex: 0 0 auto;
  min-height: 44px;
  white-space: nowrap;
}

.detail-contact-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}

.detail-contact-card {
  padding: 12px;
  border-radius: 12px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  overflow-wrap: anywhere;
}

.detail-contact-card strong {
  display: block;
  color: var(--moon-primary);
  margin-bottom: 4px;
}

.compact-form {
  margin-top: 12px;
}

.detail-form.compact-form {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.form-note {
  margin: 6px 0 0;
  font-size: 12px;
  color: rgba(255,255,255,0.64);
}

#toast {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999999;
  max-width: min(420px, calc(100vw - 24px));
  padding: 12px 14px;
  border-radius: 10px;
  background: rgba(111,147,196,0.96);
  color: white;
  font-weight: 700;
  box-shadow: 0 10px 28px rgba(0,0,0,0.35);
  display: none;
}

@media (max-width: 920px) {
  body {
    padding: 12px;
  }

  .topbar,
  .crm-shell {
    display: block;
  }

  .topbar-actions {
    justify-content: flex-start;
    margin-top: 12px;
    overflow-x: auto;
    flex-wrap: nowrap;
    -webkit-overflow-scrolling: touch;
  }

  .topbar-actions a,
  .topbar-actions button {
    flex: 0 0 auto;
    min-height: 44px;
    white-space: nowrap;
  }

  .lead-form-card {
    position: static;
    margin-top: 16px;
  }

  .kpi-strip {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding-bottom: 6px;
    -webkit-overflow-scrolling: touch;
  }

  .kpi-card {
    flex: 0 0 155px;
  }

  .section-card-grid,
  .customer-grid {
    grid-template-columns: 1fr;
  }

  .customer-card {
    width: 100%;
    text-align: left;
  }

  .filters,
  .detail-grid,
  .detail-form,
  .detail-form.compact-form,
  .detail-contact-grid,
  .form-grid {
    grid-template-columns: 1fr;
  }

  .span-2 {
    grid-column: auto;
  }
}

@media (max-width: 640px) {
  body {
    padding: 10px;
  }

  #pageOverlay {
    max-width: 100%;
  }

  .topbar h1 {
    font-size: 26px;
  }

  .panel,
  .lead-form-card {
    padding: 12px;
    border-radius: 14px;
  }

  .field input,
  .field select,
  .lead-form-card input,
  .lead-form-card select,
  .lead-form-card textarea,
  .detail-form input,
  .detail-form select,
  .detail-form textarea,
  .primary-btn,
  .secondary-btn,
  .danger-btn,
  .moon-tab {
    min-height: 44px;
  }

  .detail-panel {
    position: fixed;
    inset: 0;
    z-index: 9999;
    margin: 0;
    padding: 14px;
    border-radius: 0;
    overflow-y: auto;
    background: #101823;
  }

  .detail-header {
    position: sticky;
    top: 0;
    z-index: 2;
    padding-bottom: 12px;
    background: #101823;
  }

  .customer-meta-grid {
    grid-template-columns: 1fr;
  }

  .crm-section {
    padding: 12px;
  }
}

/* ================= PHASE 5 CRM POLISH ================= */

  --moon-card: #f4f8fd;
  --moon-ink: #142033;
  --moon-muted: #64748b;
}

body {

}

#pageOverlay {
  max-width: 1220px;
}

#loginCard {
  width: min(390px, calc(100vw - 28px));
  padding: 36px 30px;
  border-radius: 24px;
  background: rgba(14, 24, 38, 0.88);
  border: 1px solid rgba(127,184,230,0.28);
  box-shadow: 0 28px 80px rgba(0,0,0,0.72);
}

#loginLogo {
  width: 124px;
}

.loginTitle {
  margin-bottom: 8px;
  font-size: 28px;
  color: var(--moon-primary);
}

.loginSubtitle {
  margin: 0 0 22px;
  color: rgba(255,255,255,0.68);
  line-height: 1.45;
}

#loginPassword,
.field input,
.field select,
.lead-form-card input,
.lead-form-card select,
.lead-form-card textarea,
.detail-form input,
.detail-form select,
.detail-form textarea {

  border-color: rgba(127,184,230,0.28);
}

#loginButton,
.moon-tab,
.primary-btn {
  min-height: 44px;

}

.topbar {

.panel,
.lead-form-card,
.detail-panel {

  border-color: rgba(127,184,230,0.2);

  box-shadow: 0 18px 50px rgba(0,0,0,0.28);
}

.filters {
  padding: 12px;
  border: 1px solid rgba(127,184,230,0.14);
  border-radius: 18px;
  background: rgba(255,255,255,0.04);
}

.kpi-card {
  border: 1px solid rgba(127,184,230,0.18);

  background:

}

  letter-spacing: -0.04em;
}

.crm-section {

}

.crm-section-header {
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.crm-section-header h2 {
  letter-spacing: -0.02em;
}

.section-count {
  min-width: 34px;

  background: rgba(127,184,230,0.18);
  color: var(--moon-primary);
  text-align: center;
}

.customer-card {
  border-radius: 20px;
  border-color: rgba(127,184,230,0.2);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.99), rgba(235,245,253,0.99));
  text-align: left;
}

.customer-name {
  color: #15324e;
  letter-spacing: -0.02em;
}

.badge {
  border: 1px solid rgba(127,184,230,0.22);
  background: rgba(127,184,230,0.16);
}

.badge-hot {
  border-color: rgba(255,217,102,0.7);
  background: #ffd966;
}

.badge-overdue {
  border-color: rgba(255,120,120,0.7);
  background: rgba(255,120,120,0.22);
  color: #ffd4d4;
}

.badge-cooling {
  border-color: rgba(127,184,230,0.55);
  background: rgba(127,184,230,0.2);
  color: #d8ecff;
}

.badge-inactive {
  border-color: rgba(160,160,180,0.55);
  background: rgba(120,120,140,0.28);
  color: #e8e8f0;
}

.badge-reactivation {
  border-color: rgba(120,220,160,0.55);
  background: rgba(80,180,120,0.22);
  color: #d8ffe8;
}

.smart-queue-section {
  border-color: rgba(127,184,230,0.32);
  background: rgba(13,22,34,0.78);
}

.notes-preview {

}

.lead-form-card {
  background: rgba(13,22,34,0.82);
}

.lead-form-card h2,
.detail-panel h2,
.detail-section h3 {
  letter-spacing: -0.02em;
}

.detail-panel.open {
  border-color: rgba(127,184,230,0.28);
}

.detail-header {
  align-items: center;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.detail-section {
  border-radius: 18px;
  border-color: rgba(127,184,230,0.16);
  background: rgba(255,255,255,0.055);
}

.detail-contact-card {
  border-radius: 16px;
  border-color: rgba(127,184,230,0.18);
}

.quick-actions {
  scrollbar-width: thin;
}

.quick-actions button {
  border-radius: 999px;
}

.detail-item {
  line-height: 1.45;
}

#toast {
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 14px;
}

@media (max-width: 920px) {
  .topbar,
  .panel,
  .lead-form-card {
    border-radius: 18px;
  }
}

@media (max-width: 640px) {
  #loginCard {
    padding: 30px 22px;
  }

  .topbar {
    padding: 14px;
  }

  .topbar h1 {
    font-size: 24px;
  }

  .filters {
    padding: 10px;
  }

  .detail-panel {
    border: none;
    box-shadow: none;
  }

  .detail-header {
    margin: -14px -14px 14px;
    padding: 14px;
  }
}
</style>
</head>
<body>
<div id="toast"></div>
<div id="watermarkUnderlay"></div>
<img src="/NewLogoColor.png" id="watermarkLogo" alt="Moon Auto Detailing Logo" />

<div id="loginOverlay">
  <form id="loginCard" autocomplete="off">
    <img src="/NewLogoColor.png" id="loginLogo" alt="Moon Auto Detailing" />
    <h2 class="loginTitle">Moon Auto Detailing</h2>
    <p class="loginSubtitle">Secure CRM workspace for leads, follow-ups, and customer relationships.</p>
    <input type="text" style="display:none">
    <input type="password" style="display:none">
    <input
      id="loginPassword"
      type="password"
      placeholder="Password"
      autocomplete="new-password"
      autocapitalize="off"
      autocorrect="off"
      spellcheck="false"
    />
    <button id="loginButton" type="submit">Unlock CRM Dashboard</button>
    <div id="loginError">Wrong password</div>
  </form>
</div>

<div id="pageOverlay">
  <header class="topbar">
    <div>
      <h1>Moon Auto Detailing CRM</h1>
      <p>Daily follow-ups, leads, customers, and relationship notes.</p>
    </div>
    <div class="topbar-actions">

<script>
let ADMIN_SESSION = sessionStorage.getItem("moon_admin_session");

const MS_DAY = 24 * 60 * 60 * 1000;

const state = {
  customers: [],
  selectedCustomerId: null,
  detail: null,
  tags: []
};

function isLoggedIn() {
  return !!ADMIN_SESSION;
}

function showLoginOverlay() {
  document.getElementById("loginOverlay").style.display = "flex";
}

function hideLoginOverlay() {
  document.getElementById("loginOverlay").style.display = "none";
}

function clearAdminSession() {
  ADMIN_SESSION = null;
  sessionStorage.removeItem("moon_admin_session");
}

async function performLogin(password) {
  const res = await fetch("/api/admin-login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password })
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error("Unauthorized");
  ADMIN_SESSION = data.token;
  sessionStorage.setItem("moon_admin_session", ADMIN_SESSION);
}

async function requireLoginUI() {
  if (ADMIN_SESSION) return;

  const oldForm = document.getElementById("loginCard");
  const newForm = oldForm.cloneNode(true);
  oldForm.parentNode.replaceChild(newForm, oldForm);

  const input = document.getElementById("loginPassword");
  const error = document.getElementById("loginError");

  return new Promise(resolve => {
    async function attemptLogin() {
      error.style.display = "none";
      try {
        await performLogin(input.value);
        resolve();
      } catch {
        error.style.display = "block";
        input.value = "";
      }
    }

    newForm.onsubmit = e => {
      e.preventDefault();
      attemptLogin();
    };
  });
}

async function adminFetch(url, options = {}, retry = true) {
  options.headers = options.headers || {};
  options.headers["x-admin-session"] = ADMIN_SESSION;

  const res = await fetch(url, options);
  if (res.status === 401 && retry) {
    clearAdminSession();
    showLoginOverlay();
    await requireLoginUI();
    if (!isLoggedIn()) throw new Error("Admin re-login required");
    options.headers["x-admin-session"] = ADMIN_SESSION;
    return adminFetch(url, options, false);
  }
  return res;
}

async function apiJson(url, options = {}) {
  const res = await adminFetch(url, options);
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.ok === false) {
    throw new Error(data.error || `Request failed: ${res.status}`);
  }
  return data;
}

function toast(message, isError = false) {
  const el = document.getElementById("toast");
  el.textContent = message;
  el.style.background = isError ? "rgba(176,0,32,0.96)" : "rgba(111,147,196,0.96)";
  el.style.display = "block";
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => {
    el.style.display = "none";
  }, 3500);
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    "\"": "&quot;",
    "'": "&#39;"
  }[ch]));
}

function cleanFormValue(value) {
  const text = String(value || "").trim();
  return text || null;
}

function dateTimeLocalToIso(value) {
  if (!value) return null;
  const date = new Date(value);
  return Number.isNaN(date.getTime()) ? null : date.toISOString();
}

function formatDate(value) {
  if (!value) return "Not set";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleString();
}

function formatShortDate(value) {
  if (!value) return "Not set";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleDateString();
}

function formatMoney(value) {
  const amount = Number(value || 0);
  return amount.toLocaleString(undefined, { style: "currency", currency: "USD" });
}

function normalize(value) {
  return String(value || "").trim().toLowerCase();
}

function notesPreview(value) {
  const text = String(value || "").trim();
  if (!text) return "";
  return text.length > 110 ? `${text.slice(0, 110)}...` : text;
}

function customerId(row) {
  return row.customer_id || row.id;
}

function customerName(row) {
  return row.full_name || row.name || "Unnamed customer";
}

function priorityValue(row) {
  return row.crm_priority || row.priority || "medium";
}

function statusValue(row) {
  return row.crm_status || row.status || "active";
}

function stageValue(row) {
  return row.lifecycle_stage || "lead";
}

function isFollowUpDue(row) {
  if (!row.next_follow_up_at) return false;
  const due = new Date(row.next_follow_up_at);
  if (Number.isNaN(due.getTime())) return false;
  const endOfToday = new Date();
  endOfToday.setHours(23, 59, 59, 999);
  return due.getTime() <= endOfToday.getTime();
}

function isLeadOrProspect(row) {
  const stage = normalize(stageValue(row));
  return stage === "lead" || stage === "quoted";
}

function isActiveCustomer(row) {
  const status = normalize(statusValue(row));
  return ["confirmed", "completed_customer", "repeat_customer", "booked"].includes(status);
}

function isHighValue(row) {
  const priority = normalize(priorityValue(row));
  return Number(row.total_revenue || 0) >= 500 || priority === "high" || priority === "urgent";
}

function isOverdueFollowUp(row) {
  if (!row.next_follow_up_at) return false;
  const due = new Date(row.next_follow_up_at);
  if (Number.isNaN(due.getTime())) return false;
  return due.getTime() < Date.now();
}

function isCoolingCustomer(row) {
  return normalize(statusValue(row)) === "cooling";
}

function isInactiveCustomer(row) {
  return normalize(statusValue(row)) === "inactive";
}

function daysSinceLastService(row) {
  if (!row.last_service_date) return null;
  const date = new Date(row.last_service_date);
  if (Number.isNaN(date.getTime())) return null;
  return (Date.now() - date.getTime()) / MS_DAY;
}

function isReactivationOpportunity(row) {
  if (Number(row.total_revenue || 0) < 300) return false;
  const days = daysSinceLastService(row);
  return days !== null && days >= 90;
}

function statusBadgeClass(row) {
  const status = normalize(statusValue(row));
  if (status === "cooling") return "badge-cooling";
  if (status === "inactive") return "badge-inactive";
  if (status === "do_not_contact") return "badge-inactive";
  if (isOverdueFollowUp(row)) return "badge-overdue";
  if (isReactivationOpportunity(row)) return "badge-reactivation";
  return "";
}

function setListStatus(message, isError = false) {
  const el = document.getElementById("listStatus");
  el.textContent = message;
  el.className = isError ? "status-line error-text" : "status-line";
}

function buildCustomerQuery() {
  const params = new URLSearchParams({ limit: "100" });
  const q = document.getElementById("searchInput").value.trim();
  const lifecycle = document.getElementById("lifecycleFilter").value;
  const status = document.getElementById("statusFilter").value;
  const priority = document.getElementById("priorityFilter").value;
  const due = document.getElementById("dueFilter").value;

  if (q) params.set("q", q);
  if (lifecycle) params.set("lifecycle_stage", lifecycle);
  if (status) params.set("crm_status", status);
  if (priority) params.set("priority", priority);
  if (due) params.set("due", due);

  return params.toString();
}

async function loadCustomers() {
  setListStatus("Loading CRM customers...");
  try {
    const data = await apiJson(`/api/admin-crm-customers?${buildCustomerQuery()}`);
    state.customers = data.customers || [];
    renderCustomers();
    setListStatus(`${state.customers.length} shown${typeof data.count === "number" ? ` of ${data.count}` : ""}`);
  } catch (err) {
    setListStatus(err.message || "Failed to load CRM customers", true);
  }
}

function renderCustomers() {
  renderKpis();

  const sections = [
    ["Overdue Follow-Ups", state.customers.filter(isOverdueFollowUp), { smart: true }],
    ["Cooling Customers", state.customers.filter(isCoolingCustomer), { smart: true }],
    ["Inactive Customers", state.customers.filter(isInactiveCustomer), { smart: true }],
    ["Reactivation Opportunities", state.customers.filter(isReactivationOpportunity), { smart: true }],
    ["Follow-Ups Due", state.customers.filter(isFollowUpDue), {}],
    ["Leads / Prospects", state.customers.filter(isLeadOrProspect), {}],
    ["Active Customers", state.customers.filter(isActiveCustomer), {}],
    ["High-Value Customers", state.customers.filter(isHighValue), {}]
  ];

  const container = document.getElementById("crmSections");
  container.innerHTML = sections.map(([title, rows, options]) => renderCustomerSection(title, rows, options)).join("");

  container.querySelectorAll(".customer-card").forEach(card => {
    card.addEventListener("click", () => openCustomerDetail(card.dataset.customerId));
  });
}

function renderKpis() {
  const total = state.customers.length;
  const overdue = state.customers.filter(isOverdueFollowUp).length;
  const cooling = state.customers.filter(isCoolingCustomer).length;
  const inactive = state.customers.filter(isInactiveCustomer).length;
  const reactivation = state.customers.filter(isReactivationOpportunity).length;

  document.getElementById("kpiStrip").innerHTML = [
    ["Total Loaded", total],
    ["Overdue", overdue],
    ["Cooling", cooling],
    ["Inactive", inactive],
    ["Reactivation", reactivation]
  ].map(([label, value]) => `
    <div class="kpi-card">
      <div class="kpi-label">${escapeHtml(label)}</div>
      <div class="kpi-value">${escapeHtml(value)}</div>
    </div>
  `).join("");
}

function renderCustomerSection(title, rows, options = {}) {
  const cards = rows.length
    ? rows.map(renderCustomerCard).join("")
    : `<div class="muted">No customers in this section.</div>`;
  const sectionClass = options.smart ? "crm-section smart-queue-section" : "crm-section";

  return `
    <section class="${sectionClass}">
      <div class="crm-section-header">
        <h2>${escapeHtml(title)}</h2>
        <span class="section-count">${rows.length}</span>
      </div>
      <div class="section-card-grid">${cards}</div>
    </section>
  `;
}

function renderCustomerCard(row) {
  const id = customerId(row);
  const priority = priorityValue(row);
  const isHot = normalize(priority) === "urgent" || normalize(priority) === "high";
  const preview = notesPreview(row.crm_notes);

  return `
    <button class="customer-card ${id === state.selectedCustomerId ? "active" : ""}" type="button" data-customer-id="${escapeHtml(id)}">
      <div class="customer-name">${escapeHtml(customerName(row))}</div>
      <div class="card-line">${escapeHtml(row.phone || "No phone")}</div>
      <div class="card-line">${escapeHtml(row.email || "No email")}</div>
      <div class="badge-row">
        <span class="badge">${escapeHtml(stageValue(row))}</span>
        <span class="badge ${statusBadgeClass(row)}">${escapeHtml(statusValue(row))}</span>
        ${isOverdueFollowUp(row) ? `<span class="badge badge-overdue">overdue</span>` : ""}
        ${isReactivationOpportunity(row) ? `<span class="badge badge-reactivation">reactivation</span>` : ""}
        <span class="badge ${isHot ? "badge-hot" : ""}">${escapeHtml(priority)}</span>
      </div>
      <div class="customer-meta-grid">
        <div><span class="meta-label">Last Service</span><span class="meta-value">${escapeHtml(formatShortDate(row.last_service_date))}</span></div>
        <div><span class="meta-label">Last Contact</span><span class="meta-value">${escapeHtml(formatShortDate(row.last_contacted_at))}</span></div>
        <div><span class="meta-label">Next Follow-Up</span><span class="meta-value">${escapeHtml(formatDate(row.next_follow_up_at))}</span></div>
        <div><span class="meta-label">Revenue</span><span class="meta-value">${escapeHtml(formatMoney(row.total_revenue))}</span></div>
      </div>
      ${preview ? `<div class="notes-preview">${escapeHtml(preview)}</div>` : ""}
    </button>
  `;
}

async function openCustomerDetail(id) {
  state.selectedCustomerId = id;
  renderCustomers();
  document.getElementById("detailPanel").classList.add("open");
  document.getElementById("detailTitle").textContent = "Loading customer...";
  document.getElementById("detailSub").textContent = "";
  document.getElementById("detailBody").innerHTML = `<div class="muted">Loading detail...</div>`;

  try {
    const [detail, tags] = await Promise.all([
      apiJson(`/api/admin-crm-customer-detail?customer_id=${encodeURIComponent(id)}`),
      apiJson(`/api/admin-crm-tags?customer_id=${encodeURIComponent(id)}`)
    ]);
    state.detail = detail;
    state.tags = tags.tags || [];
    renderDetail(detail, tags.assigned_tags || []);
  } catch (err) {
    document.getElementById("detailTitle").textContent = "Customer Detail";
    document.getElementById("detailBody").innerHTML = `<div class="error-text">${escapeHtml(err.message || "Failed to load detail")}</div>`;
  }
}

function renderDetail(data, assignedTags) {
  const customer = data.customer || {};
  const profile = data.profile || {};
  const tasks = data.follow_up_tasks || [];
  const openTasks = tasks.filter(task => task.status !== "completed" && task.status !== "dismissed");
  const bookings = data.bookings || [];
  const outreachLogs = data.outreach_logs || [];

  document.getElementById("detailTitle").textContent = customerName(customer);
  document.getElementById("detailSub").textContent = [customer.email, customer.phone, customer.address].filter(Boolean).join(" | ");

  document.getElementById("detailBody").innerHTML = `
    <div class="detail-contact-grid">
      <div class="detail-contact-card"><strong>Phone</strong>${escapeHtml(customer.phone || "Not set")}</div>
      <div class="detail-contact-card"><strong>Email</strong>${escapeHtml(customer.email || "Not set")}</div>
      <div class="detail-contact-card"><strong>Address</strong>${escapeHtml(customer.address || "Not set")}</div>
    </div>

    <div class="quick-actions" aria-label="Quick actions">
      <button class="primary-btn quick-action-btn" type="button" data-action="log_outreach">Log Outreach</button>
      <button class="primary-btn quick-action-btn" type="button" data-action="set_follow_up">Set Follow-Up</button>
      <button class="secondary-btn quick-action-btn" type="button" data-action="mark_booked">Mark Booked</button>
      <button class="secondary-btn quick-action-btn" type="button" data-action="mark_ghosted">Mark Ghosted</button>
      <button class="danger-btn quick-action-btn" type="button" data-action="do_not_contact">Mark Do Not Contact</button>
      <button class="secondary-btn quick-action-btn" type="button" data-action="complete_open_task" ${openTasks.length ? "" : "disabled"}>Complete Open Task</button>
    </div>

    <div class="detail-grid">
      <section class="detail-section">
        <h3>CRM Profile</h3>
        <div class="detail-item"><strong>Stage:</strong> ${escapeHtml(profile.lifecycle_stage || customer.lifecycle_stage || "lead")}</div>
        <div class="detail-item"><strong>Status:</strong> ${escapeHtml(profile.status || statusValue(customer))}</div>
        <div class="detail-item"><strong>Priority:</strong> ${escapeHtml(profile.priority || priorityValue(customer))}</div>
        <div class="detail-item"><strong>Company:</strong> ${escapeHtml(profile.company_name || customer.company_name || "")}</div>
        <div class="detail-item"><strong>Customer Type:</strong> ${escapeHtml(profile.customer_type || "")}</div>
        <div class="detail-item"><strong>Lead Source:</strong> ${escapeHtml(profile.lead_source || "")}</div>
        <div class="detail-item"><strong>Preferred Contact:</strong> ${escapeHtml(profile.preferred_contact_method || "")}</div>
        <div class="detail-item"><strong>Total Revenue:</strong> ${escapeHtml(formatMoney(customer.total_revenue))}</div>
        <div class="detail-item"><strong>Notes:</strong> ${escapeHtml(profile.crm_notes || customer.crm_notes || "")}</div>
      </section>

      <section class="detail-section">
        <h3>Tags</h3>
        <div class="detail-item">
          ${(assignedTags || []).length ? assignedTags.map(tag => `<span class="badge">${escapeHtml(tag.name)}</span>`).join(" ") : `<span class="muted">No tags assigned.</span>`}
        </div>
        <form id="tagAssignForm" class="detail-form">
          <div>
            <label for="tagSelect">Assign Tag</label>
            <select id="tagSelect" name="tag_id">
              <option value="">Select tag</option>
              ${state.tags.map(tag => `<option value="${escapeHtml(tag.id)}">${escapeHtml(tag.name)}</option>`).join("")}
            </select>
          </div>
          <div>
            <label for="newTagName">New Tag</label>
            <input id="newTagName" name="name" placeholder="optional" />
          </div>
          <button class="primary-btn span-2" type="submit">Create/Assign Tag</button>
        </form>
      </section>

      <section class="detail-section">
        <h3>Open Follow-Up Tasks</h3>
        <div id="taskList">
          ${openTasks.length ? openTasks.map(task => `
            <div class="detail-item">
              <strong>${escapeHtml(task.task_type || "follow_up")}</strong>
              <div>Due: ${escapeHtml(formatDate(task.due_at))}</div>
              <div>Status: ${escapeHtml(task.status || "")}</div>
              <div>${escapeHtml(task.notes || "")}</div>
              <button class="secondary-btn complete-task-btn" type="button" data-task-id="${escapeHtml(task.id)}">Complete</button>
            </div>
          `).join("") : `<div class="muted">No open follow-up tasks.</div>`}
        </div>
        <form id="taskCreateForm" class="detail-form compact-form">
          <div>
            <label for="taskType">Task Type</label>
            <input id="taskType" name="task_type" value="general_follow_up" />
          </div>
          <div>
            <label for="taskDue">Due At</label>
            <input id="taskDue" name="due_at" type="datetime-local" required />
          </div>
          <div>
            <label for="taskPriority">Priority</label>
            <select id="taskPriority" name="priority">
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div>
            <label for="taskNotes">Notes</label>
            <input id="taskNotes" name="notes" />
          </div>
          <button class="primary-btn span-2" type="submit">Create Follow-Up Task</button>
        </form>
      </section>

      <section class="detail-section">
        <h3>Log Outreach</h3>
        <form id="outreachForm" class="detail-form compact-form">
          <div>
            <label for="outreachMethod">Method</label>
            <select id="outreachMethod" name="method" required>
              <option value="sms">SMS</option>
              <option value="phone">Phone</option>
              <option value="email">Email</option>
              <option value="in_person">In Person</option>
            </select>
          </div>
          <div>
            <label for="outreachType">Type</label>
            <input id="outreachType" name="outreach_type" value="general_follow_up" />
          </div>
          <div>
            <label for="responseStatus">Response</label>
            <select id="responseStatus" name="response_status">
              <option value="no_response">No Response</option>
              <option value="responded">Responded</option>
              <option value="booked">Booked</option>
              <option value="do_not_contact">Do Not Contact</option>
            </select>
          </div>
          <div>
            <label for="nextFollowUp">Next Follow-Up</label>
            <input id="nextFollowUp" name="next_follow_up_at" type="datetime-local" />
          </div>
          <div class="span-2">
            <label for="messageSummary">Message Summary</label>
            <textarea id="messageSummary" name="message_summary"></textarea>
          </div>
          <div class="span-2">
            <label for="responseNotes">Response Notes</label>
            <textarea id="responseNotes" name="response_notes"></textarea>
          </div>
          <button class="primary-btn span-2" type="submit">Log Outreach</button>
        </form>
      </section>

      <section class="detail-section">
        <h3>Booking History</h3>
        ${bookings.slice(0, 8).map(booking => `
          <div class="detail-item">
            <strong>${escapeHtml(formatDate(booking.scheduled_start))}</strong>
            <div>Status: ${escapeHtml(booking.status || "")}</div>
            <div>Total: ${escapeHtml(booking.total_price ?? "")}</div>
          </div>
        `).join("") || `<div class="muted">No bookings yet.</div>`}
      </section>

      <section class="detail-section">
        <h3>Outreach History</h3>
        ${outreachLogs.slice(0, 8).map(log => `
          <div class="detail-item">
            <strong>${escapeHtml(log.method || "")}</strong> - ${escapeHtml(formatDate(log.contacted_at))}
            <div>${escapeHtml(log.message_summary || "")}</div>
            <div>${escapeHtml(log.response_status || "")}</div>
          </div>
        `).join("") || `<div class="muted">No outreach logged.</div>`}
      </section>
    </div>
  `;

  wireDetailForms();
  if (openTasks.length) {
    document.getElementById("taskList").dataset.openCount = String(openTasks.length);
  }
}

function formObject(form) {
  const data = {};
  const formData = new FormData(form);
  for (const [key, value] of formData.entries()) {
    data[key] = cleanFormValue(value);
  }
  return data;
}

async function refreshCurrentCustomer(id) {
  await loadCustomers();
  if (id) await openCustomerDetail(id);
}

async function submitLeadForm(event) {
  event.preventDefault();
  const form = event.currentTarget;
  const body = formObject(form);
  body.next_follow_up_at = dateTimeLocalToIso(body.next_follow_up_at);
  body.lifecycle_stage = "lead";
  body.status = "active";
  body.customer_type = "residential";
  body.preferred_contact_method = "sms";

  try {
    const data = await apiJson("/api/admin-crm-create-lead", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    toast("Lead created");
    form.reset();
    await loadCustomers();
    await openCustomerDetail(data.customer_id);
  } catch (err) {
    toast(err.message || "Failed to create lead", true);
  }
}

function wireDetailForms() {
  const id = state.selectedCustomerId;

  document.querySelectorAll(".quick-action-btn").forEach(button => {
    button.addEventListener("click", async () => {
      const action = button.dataset.action;
      if (action === "log_outreach") {
        document.getElementById("outreachForm")?.scrollIntoView({ behavior: "smooth", block: "center" });
        document.getElementById("messageSummary")?.focus();
        return;
      }
      if (action === "set_follow_up") {
        document.getElementById("taskCreateForm")?.scrollIntoView({ behavior: "smooth", block: "center" });
        document.getElementById("taskDue")?.focus();
        return;
      }

      try {
        if (action === "complete_open_task") {
          const openTask = (state.detail?.follow_up_tasks || []).find(task => task.status !== "completed" && task.status !== "dismissed");
          if (!openTask) throw new Error("No open task to complete");
          await apiJson("/api/admin-crm-follow-up-task", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "complete", task_id: openTask.id })
          });
          toast("Open task completed");
        } else {
          const payload = {
            customer_id: id,
            ...(action === "mark_booked" ? { status: "booked", lifecycle_stage: "booked" } : {}),
            ...(action === "mark_ghosted" ? { status: "ghosted" } : {}),
            ...(action === "do_not_contact" ? { status: "do_not_contact", lifecycle_stage: "do_not_contact", do_not_contact: true } : {})
          };
          await apiJson("/api/admin-crm-update-profile", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          toast("CRM profile updated");
        }
        await refreshCurrentCustomer(id);
      } catch (err) {
        toast(err.message || "Quick action failed", true);
      }
    });
  });

  document.getElementById("outreachForm")?.addEventListener("submit", async event => {
    event.preventDefault();
    const body = formObject(event.currentTarget);
    body.customer_id = id;
    body.next_follow_up_at = dateTimeLocalToIso(body.next_follow_up_at);

    try {
      await apiJson("/api/admin-crm-log-outreach", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      toast("Outreach logged");
      await refreshCurrentCustomer(id);
    } catch (err) {
      toast(err.message || "Failed to log outreach", true);
    }
  });

  document.getElementById("taskCreateForm")?.addEventListener("submit", async event => {
    event.preventDefault();
    const body = formObject(event.currentTarget);
    body.action = "create";
    body.customer_id = id;
    body.due_at = dateTimeLocalToIso(body.due_at);

    try {
      await apiJson("/api/admin-crm-follow-up-task", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      toast("Follow-up task created");
      await refreshCurrentCustomer(id);
    } catch (err) {
      toast(err.message || "Failed to create task", true);
    }
  });

  document.querySelectorAll(".complete-task-btn").forEach(button => {
    button.addEventListener("click", async () => {
      try {
        await apiJson("/api/admin-crm-follow-up-task", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "complete", task_id: button.dataset.taskId })
        });
        toast("Task completed");
        await refreshCurrentCustomer(id);
      } catch (err) {
        toast(err.message || "Failed to complete task", true);
      }
    });
  });

  document.getElementById("tagAssignForm")?.addEventListener("submit", async event => {
    event.preventDefault();
    const form = event.currentTarget;
    const selectedTagId = cleanFormValue(form.tag_id.value);
    const newTagName = cleanFormValue(form.name.value);

    try {
      let tagId = selectedTagId;
      if (newTagName) {
        const tagData = await apiJson("/api/admin-crm-tags", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "create_tag", name: newTagName })
        });
        tagId = tagData.tag?.id;
      }

      if (!tagId) throw new Error("Select or create a tag");

      await apiJson("/api/admin-crm-tags", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "assign_tag", customer_id: id, tag_id: tagId })
      });
      toast("Tag assigned");
      await refreshCurrentCustomer(id);
    } catch (err) {
      toast(err.message || "Failed to assign tag", true);
    }
  });
}

async function bootCrmApp() {
  try {
    showLoginOverlay();
    await requireLoginUI();
    hideLoginOverlay();
    await loadCustomers();
  } catch (err) {
    toast(err.message || "CRM failed to load", true);
  }
}

document.getElementById("leadForm").addEventListener("submit", submitLeadForm);
document.getElementById("searchBtn").addEventListener("click", loadCustomers);
document.getElementById("refreshBtn").addEventListener("click", loadCustomers);
document.getElementById("searchInput").addEventListener("keydown", event => {
  if (event.key === "Enter") loadCustomers();
});
["lifecycleFilter", "statusFilter", "priorityFilter", "dueFilter"].forEach(id => {
  document.getElementById(id).addEventListener("change", loadCustomers);
});
document.getElementById("closeDetailBtn").addEventListener("click", () => {
  state.selectedCustomerId = null;
  state.detail = null;
  document.getElementById("detailPanel").classList.remove("open");
  renderCustomers();
});
document.getElementById("logoutBtn")?.addEventListener("click", async () => {
  clearAdminSession();
  state.customers = [];
  state.selectedCustomerId = null;
  document.getElementById("crmSections").innerHTML = "";
  document.getElementById("detailPanel").classList.remove("open");
  showLoginOverlay();
  await requireLoginUI();
  hideLoginOverlay();
  await loadCustomers();
});

bootCrmApp();
</script>
</body>
</html>
