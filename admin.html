<script type="module">
// ================= ADMIN LOGIN UI =================
let ADMIN_SESSION = null;
sessionStorage.removeItem("moon_admin_session");
function isLoggedIn() {
  return !!ADMIN_SESSION;
}

async function performLogin(password) {
  const res = await fetch("/api/admin-login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password })
  });

  const data = await res.json();

  if (!res.ok) throw new Error("Unauthorized");

  ADMIN_SESSION = data.token;
}

async function requireLoginUI() {
  if (ADMIN_SESSION) return;

  // reset form every time to avoid dead promise after logout
  const oldForm = document.getElementById("loginCard");
  const newForm = oldForm.cloneNode(true);
  oldForm.parentNode.replaceChild(newForm, oldForm);

  const input = document.getElementById("loginPassword");
  const error = document.getElementById("loginError");

  return new Promise(resolve => {
    async function attemptLogin() {
      error.style.display = "none";

      try {
        await performLogin(input.value);
        resolve();
      } catch {
        error.style.display = "block";
        input.value = "";
      }
    }

    newForm.onsubmit = e => {
      e.preventDefault();
      attemptLogin();
    };
  });
}

     
function clearAdminSession() {
  ADMIN_SESSION = null;
}

function showLoginOverlay() {
  document.getElementById("loginOverlay").style.display = "flex";
}

function hideLoginOverlay() {
  document.getElementById("loginOverlay").style.display = "none";
}
     document.getElementById("logoutBtn").onclick = async () => {
  hardLog("ADMIN LOGOUT");

  stopRealtimeBookings();
  clearAdminSession();

  currentView = null;
  refreshInFlight = false;
  viewContainer.innerHTML = "";
  viewButtons.innerHTML = "";

  const input = document.getElementById("loginPassword");
  const err = document.getElementById("loginError");
  if (input) input.value = "";
  if (err) err.style.display = "none";

  showLoginOverlay();

  // 🔴 THIS IS THE MISSING PIECE
  await requireLoginUI();
  hideLoginOverlay();

  await loadAdminData();
  startRealtimeBookings();
};


async function bootAdminApp() {
  try {
    showLoginOverlay();
    await requireLoginUI(); // may set ADMIN_SESSION

    hardLog("ADMIN AUTH TRY");

    // Try first data load. If unauthorized, force re-login.
    const ok = await loadAdminData({ silentUnauthorized: true });
    if (!ok) {
      hardLog("ADMIN TOKEN INVALID — RELOGIN");
      clearAdminSession();
      showLoginOverlay();
      await requireLoginUI();

      const ok2 = await loadAdminData({ silentUnauthorized: false });
      if (!ok2) throw new Error("Unauthorized after re-login");
    }

    hideLoginOverlay();
    hardLog("ADMIN AUTH SUCCESS");
    startRealtimeBookings();
  } catch (err) {
    hardLog("ADMIN AUTH FAILED");
    console.error(err);
  }
}



/* ===================== IMPORTS ===================== */
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

/* ===================== HARD LOG ===================== */
function hardLog(message) {
const el = document.getElementById("hardLog");
if (!el) return;
const line = document.createElement("div");
line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
el.appendChild(line);
el.scrollTop = el.scrollHeight;
}

hardLog("ADMIN LOADED");
     /* ===================== NOTIFICATION SOUND ===================== */
const bookingSound = new Audio(
  "https://cdn.jsdelivr.net/gh/jshawl/AudioFX/sounds/bling.mp3"
);
bookingSound.volume = 0.35;

     // ===================== DEBUG TOGGLE =====================
const debugToggle = document.getElementById("debugToggle");
const hardLogPanel = document.getElementById("hardLog");

debugToggle.onclick = () => {
  if (hardLogPanel.style.display === "none") {
    hardLogPanel.style.display = "block";
  } else {

/* ===================== AUTHENTICATED FETCH WRAPPER ===================== */
async function adminFetch(url, options = {}, retry = true) {
  options.headers = options.headers || {};
  options.headers["x-admin-session"] = ADMIN_SESSION;

  let res;
  try {
    res = await fetch(url, options);
  } catch (err) {
    hardLog("FETCH FAILED " + (err?.message || err));
    throw err;
  }

  if (res.status === 401 && retry) {
  hardLog("SESSION EXPIRED — RELOGIN REQUIRED");

  clearAdminSession();
  showLoginOverlay();

  // Wait for login UI to finish
  await requireLoginUI();

  // If login somehow failed or was cancelled, stop here
  if (!isLoggedIn()) {
    hardLog("RELOGIN FAILED — ABORTING REQUEST");
    throw new Error("Admin re-login required");
  }

  options.headers["x-admin-session"] = ADMIN_SESSION;

  try {
    return await adminFetch(url, options, false);
  } catch (err) {
    hardLog("RETRY FETCH FAILED " + (err?.message || err));
    throw err;
  }
}

  return res;
}

/* ===================== REALTIME BOOKINGS ===================== */
let realtimeChannel = null;

     function showToast(message) {
  const container = document.getElementById("toastContainer");

  const toast = document.createElement("div");
  toast.className = "toast";
  toast.textContent = message;

  container.appendChild(toast);

  setTimeout(() => toast.remove(), 5500);
}

function startRealtimeBookings() {
  if (realtimeChannel) return; // prevent duplicate subscriptions

  hardLog("STARTING REALTIME BOOKINGS SUBSCRIPTION");

  realtimeChannel = supabase
    .channel("admin-bookings-live")
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "bookings" },
      async (payload) => {
        try {
          hardLog("REALTIME BOOKING CHANGE DETECTED");

          // Detect NEW booking inserts only
          if (payload.eventType === "INSERT") {
            const booking = payload.new;

            if (booking && !knownBookingIds.has(booking.id)) {
              knownBookingIds.add(booking.id);

              bookingSound.play().catch(() => {});
              showToast("New booking received!");

              document.title = "• New Booking!";
              setTimeout(() => {
                document.title = "Moon Auto Detailing — Admin";
              }, 5000);
            }
          }

          const ok = await loadAdminData({ silentUnauthorized: true });
          if (ok && currentView) renderView(currentView);
        } catch (err) {
          console.error(err);
          hardLog("REALTIME ERROR " + (err?.message || err));
        }
      }
    )
    .subscribe();
}

     
function stopRealtimeBookings() {
  try {
    if (realtimeChannel) {
      hardLog("STOPPING REALTIME BOOKINGS SUBSCRIPTION");
      supabase.removeChannel(realtimeChannel);
      realtimeChannel = null;
    }
  } catch (e) {
    hardLog("STOP REALTIME ERROR " + (e?.message || e));
  }
}

     // ===================== VIEW STATE =====================
let currentView = null;
     let knownBookingIds = new Set();
     let refreshInFlight = false;

let cachedViews = {
  pending: [],
  today: [],
  upcoming: [],
};
     let reloadHistoryPage = null;
     let reloadSubscriptionsPage = null;
     let reloadDiscountCodesPage = null;
     let historyPage = 1;
const historyPageSize = 20;
let filteredHistory = [];


const viewButtons = document.getElementById("viewButtons");
const viewContainer = document.getElementById("viewContainer");
     document.getElementById("refreshNow").onclick = async () => {
  if (!ADMIN_SESSION) return;
  if (refreshInFlight) return;

  refreshInFlight = true;
  hardLog("MANUAL REFRESH CLICKED");

  try {

    // HISTORY VIEW — do NOT wipe the DOM
    if (currentView === "history") {
  if (reloadHistoryPage) {
    const ok = await reloadHistoryPage(1);
    if (!ok) {
      viewContainer.innerHTML =
        "<div style='margin-top:40px;font-weight:600;'>Failed to refresh history.</div>";
    }
  }
  return;
}

    if (currentView === "subscriptions") {
      if (reloadSubscriptionsPage) {
        await reloadSubscriptionsPage();
      }
      return;
    }

    if (currentView === "discount-codes") {
      if (reloadDiscountCodesPage) {
        await reloadDiscountCodesPage();
      }
      return;
    }

    // NORMAL VIEWS — show loading message
    viewContainer.innerHTML =
      "<div style='margin-top:40px;font-weight:600;'>Refreshing bookings...</div>";

    const ok = await loadAdminData({ silentUnauthorized: true });
    if (ok && currentView) renderView(currentView);

  } finally {
    refreshInFlight = false;
  }
};

     /* ===================== ACTION LOCKING ===================== */
const inFlightActions = new Map();
// key: `${bookingId}:${action}`

function lockBookingAction(bookingId, action) {
  const key = `${bookingId}:${action}`;
  if (inFlightActions.has(key)) return false;
  inFlightActions.set(key, true);
  return true;
}

function unlockBookingAction(bookingId, action) {
  const key = `${bookingId}:${action}`;
  inFlightActions.delete(key);
}

function setBookingButtonsDisabled(card, disabled) {
  const buttons = card.querySelectorAll("button");
  buttons.forEach(btn => {
    btn.disabled = disabled;
    if (disabled) {
      btn.dataset.originalText = btn.textContent;
      btn.textContent = "Working...";
    } else {
      if (btn.dataset.originalText) {
        btn.textContent = btn.dataset.originalText;
      }
    }
  });
}


/* ===================== FORMAT HELPERS ===================== */
function isValidDate(d) {
  return d instanceof Date && !isNaN(d.getTime());
}

function formatDay(d) {
  if (!isValidDate(d)) return "Invalid date";
  return d.toLocaleDateString(undefined, {
    weekday: "long",
    year: "numeric",
    month: "long",
    day: "numeric"
  });
}

function formatTime(d) {
  if (!isValidDate(d)) return "—";
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}
     
/* ===================== LOAD BOOKINGS ===================== */
async function loadAdminData(opts = {}) {
  hardLog("LOADING ADMIN DATA");

  try {
    const res = await adminFetch("/api/admin-bookings");

    if (!res.ok) {
      hardLog("UNAUTHORIZED");
      if (!opts.silentUnauthorized) {
        viewContainer.innerHTML =
          "<div style='margin-top:40px;font-weight:600;'>Unauthorized.</div>";
      }
      return false;
    }

    const data = await res.json();

    // Normalize payload shape safely
    const bookings = Array.isArray(data)
      ? data
      : (data.bookings || data.rows || data.data || []);

    splitAndRender(bookings);
    renderButtons();

    if (currentView) {
      renderView(currentView);
      highlightActiveButton(currentView);
    } else {
      renderDashboard();
    }

    return true;
  } catch (err) {
    console.error(err);
    hardLog("ADMIN DATA LOAD FAILED " + (err?.message || err));

    if (!opts.silentUnauthorized) {
      viewContainer.innerHTML =
        "<div style='margin-top:40px;font-weight:600;'>Failed to load bookings. Try Refresh.</div>";
    }

    return false;
  }
}


function splitAndRender(bookings) {

cachedViews.pending = [];
cachedViews.today = [];
cachedViews.upcoming = [];
cachedViews.history = [];

const now = new Date();
const startOfToday = new Date();
startOfToday.setHours(0,0,0,0);

const endOfToday = new Date(startOfToday);
endOfToday.setDate(endOfToday.getDate() + 1);

bookings.forEach(b => {
const start = new Date(b.scheduled_start);

if (b.status === "pending") {
  cachedViews.pending.push(b);
}

else if (b.status === "confirmed") {
if (start >= startOfToday && start < endOfToday) {
cachedViews.today.push(b);
} else if (start >= endOfToday) {
cachedViews.upcoming.push(b);
}
}

});
     bookings.forEach(b => knownBookingIds.add(b.id));
}

function renderSection(title, bookings, collapsed = false) {
const section = document.createElement("div");
section.className = "day";

const header = document.createElement("h2");
header.textContent = `${title} (${bookings.length})`;
section.appendChild(header);

const body = document.createElement("div");

if (collapsed) {
body.style.display = "none";
header.style.cursor = "pointer";
header.onclick = () => {
body.style.display =
body.style.display === "none" ? "block" : "none";
};
}

// 🔹 Group bookings by calendar day
const groups = {};

bookings.forEach(b => {
const dayKey = new Date(b.scheduled_start).toDateString();
if (!groups[dayKey]) groups[dayKey] = [];
groups[dayKey].push(b);
});

Object.entries(groups).forEach(([day, items]) => {
const dayHeader = document.createElement("h3");
dayHeader.textContent = formatDay(new Date(day));
body.appendChild(dayHeader);

items.forEach(b => {
body.appendChild(buildCard(b));
});
});

section.appendChild(body);
viewContainer.appendChild(section);
}

function buildCard(b) {
  const start = new Date(b.scheduled_start);
  const end = new Date(b.scheduled_end);

function renderButtons() {
  viewButtons.innerHTML = "";

  const buttons = [
    { key: "pending", label: "Pending Bookings" },
    { key: "today", label: "Today's Schedule" },
    { key: "upcoming", label: "Upcoming Bookings" },
    { key: "history", label: "History" },
    { key: "subscriptions", label: "Subscriptions" },
    { key: "discount-codes", label: "Discount Codes" }
  ];

  buttons.forEach(btn => {
    const button = document.createElement("button");
    button.textContent = btn.label;
    button.className = "moon-tab";
    button.dataset.view = btn.key;

    button.onclick = () => {
      handleViewSwitch(btn.key);
    };

    viewButtons.appendChild(button);
  });
}

function handleViewSwitch(viewName) {
  if (currentView === viewName) {
    currentView = null;
    renderDashboard();
    highlightActiveButton(null);
    return;
  }

  currentView = viewName;
renderView(viewName);
highlightActiveButton(viewName);
}

function highlightActiveButton(activeKey) {
  const all = viewButtons.querySelectorAll("button");

  all.forEach(btn => {
    if (btn.dataset.view === activeKey) {
      btn.classList.add("active");
    } else {
      btn.classList.remove("active");
    }
  });
}

        detailPanel.querySelectorAll("[data-action]").forEach(btn => {
          btn.onclick = async () => {
            const action = btn.dataset.action;
            if (action === "changePlan") {
              const freq = prompt("New frequency (biweekly, monthly, quarterly)? Leave blank to keep.");
              if (freq === null) return;
              const svId = prompt("New service_variant_id (UUID)? Leave blank to keep.");
              const body = { subscription_id: id };
              if (freq && ["biweekly", "monthly", "quarterly"].includes(freq)) body.frequency = freq;
              if (svId && svId.trim()) body.service_variant_id = svId.trim();
              if (!body.frequency && !body.service_variant_id) return;
              try {
                const r = await adminFetch("/api/admin-change-subscription-plan", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
                const d = await r.json();
                if (!r.ok) throw new Error(d.error || "Failed");
                showToast("Plan updated.");
                loadSubscriptionDetail(id);
                loadSubscriptionsList();
              } catch (e) { showToast("Error: " + (e.message || "Unknown")); }
              return;
            }
            const endpoints = { pause: "/api/admin-pause-subscription", resume: "/api/admin-resume-subscription", cancel: "/api/admin-cancel-subscription", extend: "/api/admin-extend-subscription-cycle", forceCreate: "/api/admin-force-create-subscription-cycle" };
            const url = endpoints[action];
            if (!url) return;
            btn.disabled = true;
            try {
              const r = await adminFetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ subscription_id: id }) });
              const d = await r.json();
              if (!r.ok) throw new Error(d.error || "Failed");
              showToast(d.message || "Done.");
              loadSubscriptionDetail(id);
              loadSubscriptionsList();
            } catch (e) { showToast("Error: " + (e.message || "Unknown")); }
            btn.disabled = false;
          };
        });
      } catch (err) {
        detailPanel.innerHTML = "<div style='color:#ff6b6b;'>" + (err.message || "Failed to load detail") + "</div>";
      }
    }

    searchInputSub.addEventListener("keydown", (e) => { if (e.key === "Enter") loadSubscriptionsList(); });
    statusSelect.addEventListener("change", loadSubscriptionsList);
    freqSelect.addEventListener("change", loadSubscriptionsList);

    reloadSubscriptionsPage = loadSubscriptionsList;
    loadSubscriptionsList();
    return;
  }

  // =========================
  // DISCOUNT CODES
  // =========================
  if (viewName === "discount-codes") {
    const wrapper = document.createElement("div");
    wrapper.style.display = "flex";
    wrapper.style.flexDirection = "column";
    wrapper.style.gap = "24px";

    const createSection = document.createElement("div");
    createSection.style.padding = "18px";
    createSection.style.borderRadius = "14px";
    createSection.style.border = "1px solid rgba(255,255,255,0.2)";
    createSection.style.background = "rgba(111,147,196,0.15)";
    createSection.innerHTML = "<h3 style='margin-top:0;'>Create discount code</h3>";
    const form = document.createElement("form");
    form.style.display = "grid";
    form.style.gridTemplateColumns = "1fr 1fr auto auto auto";
    form.style.gap = "10px";
    form.style.alignItems = "end";
    form.style.flexWrap = "wrap";
    const codeInput = document.createElement("input");
    codeInput.placeholder = "Code";
    codeInput.name = "code";
    codeInput.style.padding = "8px 12px";
    codeInput.style.borderRadius = "6px";
    codeInput.style.border = "1px solid rgba(255,255,255,0.3)";
    codeInput.style.background = "rgba(255,255,255,0.08)";
    codeInput.style.color = "white";
    const pctInput = document.createElement("input");
    pctInput.type = "number";
    pctInput.min = "1";
    pctInput.max = "100";
    pctInput.placeholder = "% off";
    pctInput.name = "percent_off";
    pctInput.style.padding = "8px 12px";
    pctInput.style.borderRadius = "6px";
    pctInput.style.border = "1px solid rgba(255,255,255,0.3)";
    pctInput.style.background = "rgba(255,255,255,0.08)";
    pctInput.style.color = "white";
    const startInput = document.createElement("input");
    startInput.type = "datetime-local";
    startInput.name = "starts_at";
    startInput.style.padding = "8px 12px";
    startInput.style.borderRadius = "6px";
    startInput.style.border = "1px solid rgba(255,255,255,0.3)";
    startInput.style.background = "rgba(255,255,255,0.08)";
    startInput.style.color = "white";
    const endInput = document.createElement("input");
    endInput.type = "datetime-local";
    endInput.name = "ends_at";
    endInput.style.padding = "8px 12px";
    endInput.style.borderRadius = "6px";
    endInput.style.border = "1px solid rgba(255,255,255,0.3)";
    endInput.style.background = "rgba(255,255,255,0.08)";
    endInput.style.color = "white";
    const submitBtn = document.createElement("button");
    submitBtn.type = "submit";
    submitBtn.textContent = "Create";
    submitBtn.className = "moon-tab";
    form.appendChild(codeInput);
    form.appendChild(pctInput);
    form.appendChild(startInput);
    form.appendChild(endInput);
    form.appendChild(submitBtn);
    createSection.appendChild(form);
    wrapper.appendChild(createSection);

    const activeList = document.createElement("div");
    activeList.id = "discountCodesActive";
    activeList.style.marginTop = "8px";
    const scheduledList = document.createElement("div");
    scheduledList.id = "discountCodesScheduled";
    const inactiveHeader = document.createElement("h3");
    inactiveHeader.textContent = "Inactive / expired / disabled";
    inactiveHeader.style.cursor = "pointer";
    inactiveHeader.style.marginBottom = "8px";
    const inactiveBody = document.createElement("div");
    inactiveBody.id = "discountCodesInactive";
    inactiveBody.style.display = "none";
    let inactiveOpen = false;
    inactiveHeader.onclick = () => {
      inactiveOpen = !inactiveOpen;
      inactiveBody.style.display = inactiveOpen ? "block" : "none";
    };

    async function loadDiscountCodes() {
      const res = await adminFetch("/api/admin-discount-codes-list");
      const data = await res.json();
      if (!res.ok) {
        wrapper.innerHTML = "<div style='color:#ff6b6b;'>" + (data.error || "Failed to load") + "</div>";
        return;
      }
      function fmtRow(d) {
        const start = d.starts_at ? new Date(d.starts_at).toLocaleString() : "—";
        const end = d.ends_at ? new Date(d.ends_at).toLocaleString() : "—";
        return `<div style="padding:10px 14px; margin-bottom:8px; border-radius:10px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.06); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
          <span><strong>${(d.code || "").replace(/</g, "&lt;")}</strong> ${d.percent_off}% off · ${start} → ${end}</span>
          ${!d.is_disabled ? `<button type="button" class="moon-tab" data-disable-id="${d.id}">Disable</button>` : "<span style='color:#888;'>Disabled</span>"}
        </div>`;
      }
      activeList.innerHTML = "<h3 style='margin-top:0;'>Active</h3>" + (data.active && data.active.length ? data.active.map(fmtRow).join("") : "<p style='color:#9ca3af;'>None</p>");
      scheduledList.innerHTML = "<h3 style='margin-top:0;'>Scheduled / upcoming</h3>" + (data.scheduled && data.scheduled.length ? data.scheduled.map(fmtRow).join("") : "<p style='color:#9ca3af;'>None</p>");
      inactiveBody.innerHTML = (data.inactive && data.inactive.length ? data.inactive.map(fmtRow).join("") : "<p style='color:#9ca3af;'>None</p>");
      activeList.querySelectorAll("[data-disable-id]").forEach(btn => {
        btn.onclick = async () => {
          const id = btn.dataset.disableId;
          try {
            const r = await adminFetch("/api/admin-discount-codes-disable", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ id }) });
            const d = await r.json();
            if (!r.ok) throw new Error(d.error || "Failed");
            showToast("Code disabled.");
            loadDiscountCodes();
          } catch (e) { showToast("Error: " + (e.message || "Unknown")); }
        };
      });
      scheduledList.querySelectorAll("[data-disable-id]").forEach(btn => {
        btn.onclick = async () => {
          const id = btn.dataset.disableId;
          try {
            const r = await adminFetch("/api/admin-discount-codes-disable", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ id }) });
            const d = await r.json();
            if (!r.ok) throw new Error(d.error || "Failed");
            showToast("Code disabled.");
            loadDiscountCodes();
          } catch (e) { showToast("Error: " + (e.message || "Unknown")); }
        };
      });
      inactiveBody.querySelectorAll("[data-disable-id]").forEach(btn => {
        btn.onclick = async () => {
          const id = btn.dataset.disableId;
          try {
            const r = await adminFetch("/api/admin-discount-codes-disable", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ id }) });
            const d = await r.json();
            if (!r.ok) throw new Error(d.error || "Failed");
            showToast("Code disabled.");
            loadDiscountCodes();
          } catch (e) { showToast("Error: " + (e.message || "Unknown")); }
        };
      });
    }

    form.onsubmit = async (e) => {
      e.preventDefault();
      const startsAt = startInput.value ? new Date(startInput.value).toISOString() : "";
      const endsAt = endInput.value ? new Date(endInput.value).toISOString() : "";
      try {
        const r = await adminFetch("/api/admin-discount-codes-create", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            code: codeInput.value.trim(),
            percent_off: Number(pctInput.value) || 0,
            starts_at: startsAt,
            ends_at: endsAt
          })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || "Failed");
        showToast("Discount code created.");
        codeInput.value = "";
        pctInput.value = "";
        startInput.value = "";
        endInput.value = "";
        loadDiscountCodes();
      } catch (err) { showToast("Error: " + (err.message || "Unknown")); }
    };

    wrapper.appendChild(activeList);
    wrapper.appendChild(scheduledList);
    wrapper.appendChild(inactiveHeader);
    wrapper.appendChild(inactiveBody);
    viewContainer.appendChild(wrapper);

    reloadDiscountCodesPage = loadDiscountCodes;
    loadDiscountCodes();
    return;
  }

  // =========================
// NORMAL VIEWS
// =========================
const data = cachedViews[viewName];

if (!data || data.length === 0) {
  let message = "No records found.";

  if (viewName === "pending") {
    message = "No pending bookings yet.";
  } else if (viewName === "today") {
    message = "No jobs scheduled for today.";
  } else if (viewName === "upcoming") {
    message = "No upcoming confirmed bookings.";
  }

  viewContainer.innerHTML =
  `<div style="margin-top:40px;font-weight:600;color:white;text-align:center;">${message}</div>`;
  return;
}

renderSection(viewName.toUpperCase(), data);
}

 bootAdminApp();

     
</script>
</body>
</html>
